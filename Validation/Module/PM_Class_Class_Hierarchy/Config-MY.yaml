MODULE: "PM Class & Class Hierarchy (MY)"

# ─── File locations (relative to project root) ──────────────────────────────
# TODO: replace with actual MY template path when available
TEMPLATE_PATH:        "Module/PM_Class_Class_Hierarchy/[SHANA] MNT-PM-M002_PM Class & Class Hierarchy_MY_Preload.xlsx"
DATA_STANDARD_PATH:   "Metadata/DataStandard/DataStandardList.xlsx"
DATA_STANDARD_SHEET:  "PM Class and Class Hierarchy"
MAPPING_PATH:         "Metadata/Mapping/KDS_PM_Class_Class_Hierarchy.xlsx"
OUTPUT_PATH:          "Output"
OUTPUT_FILE_NAME:     "[SHANA] MNT-PM-M002_PM Class & Class Hierarchy_MY_Data Cleansing.xlsx"

# ─── Ignore configuration ────────────────────────────────────────────────────
CONFIG_IGNORE_FIELD_SHEET: "Config_Ignore_Field"

IGNORE_COLUMN_SUFFIXES:
  - "_SRC"
  - "_DESC"
  - "_DESCRIPTION"
  - "SOURCE"
  - "REMARKS"
  - "COUNTRY"

# ─── Jobs (one per worksheet) ────────────────────────────────────────────────
# TODO: update SHEET_KEYWORD to match actual MY template sheet names
JOBS:
  - NAME:          "1. Class Header Data"
    SHEET_KEYWORD: "MM_KLAH_Class Header Data"
    DS_TABLE:
      - "KLAH"

    VALIDATIONS:
      - mandatory
      - length

    PRIMARY_KEYS:
      - ["KLART_TGT", "CLASS_TGT"]

    FIXED_VALUE_FIELDS:
      - column: "KLART_TGT"
        allowed_values:
          - "002"
          - "003"
          - "019"
      - column: "STATU_TGT"
        allowed_values:
          - "1"
          - "2"
          - "3"
      - column: "PRAUS_TGT"
        allowed_values:
          - "0"
          - "1"

    PROHIBITED_NEWLINE_FIELDS:
      - "CLASS_TGT"

    NON_BLANK_OPTIONAL_FIELDS:     []
    NON_BLANK_OPTIONAL_ANY_FIELDS: []
    START_WITH_FIELDS:             []
    SAME_SHEET_REFERENCES:         []
    CROSS_SHEET_REFERENCES:        []
    KDS_REFERENCES:                []
    KDS_PROHIBITED_REFERENCES:     []

    CUSTOM_VALIDATIONS:
      - check_ad_date:
          - VONDT_TGT
          - BISDT_TGT

  - NAME:          "2. Classification System (Keywords)"
    SHEET_KEYWORD: "MM_SWOR_Classification System"
    DS_TABLE:
      - "SWOR"

    VALIDATIONS:
      - mandatory
      - length

    PRIMARY_KEYS:
      - ["CLINT_TGT", "SPRAS_TGT", "KSCHL_TGT"]

    FIXED_VALUE_FIELDS:
      - column: "SPRAS_TGT"
        allowed_values:
          - "M"                     # Malay
          - "E"                     # English

    PROHIBITED_NEWLINE_FIELDS:
      - "KSCHL_TGT"

    NON_BLANK_OPTIONAL_FIELDS:     []
    NON_BLANK_OPTIONAL_ANY_FIELDS: []
    START_WITH_FIELDS:             []
    SAME_SHEET_REFERENCES:         []
    CROSS_SHEET_REFERENCES:        []
    KDS_REFERENCES:                []
    KDS_PROHIBITED_REFERENCES:     []
    CUSTOM_VALIDATIONS:            []

    FIXED_VALUE_FIELDS: []
    PROHIBITED_NEWLINE_FIELDS:
      - "KTEXT_TGT"
    NON_BLANK_OPTIONAL_FIELDS:     [] 
    NON_BLANK_OPTIONAL_ANY_FIELDS: []
    SAME_SHEET_REFERENCES:         []
    CROSS_SHEET_REFERENCES: 
      - source_columns:       ["WERKS", "ARBPL"]
        target_sheet_keyword: "PMWORKCENTER_KAKO_T_RPT_TH"
        target_columns:       ["WERKS", "ARBPL"]
    KDS_REFERENCES:     [] 
    KDS_PROHIBITED_REFERENCES:     [] 
    CUSTOM_VALIDATIONS:     [] 





